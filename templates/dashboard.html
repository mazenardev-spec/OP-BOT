<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | السيرفرات</title>
    <style>
        body { background: #051614; color: #eef; font-family: sans-serif; margin: 0; padding: 40px; }
        h1 { text-align: center; color: #43b581; font-size: 2.5rem; margin-bottom: 40px; }
        .guilds-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px; max-width: 1200px; margin: auto;
        }
        .guild-card {
            background: #0a2e2a; border-radius: 20px; padding: 30px;
            text-align: center; border: 1px solid #123d38;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .guild-card:hover { 
            transform: translateY(-10px); 
            border-color: #43b581; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .guild-icon { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #43b581; margin-bottom: 15px; }
        .manage-btn {
            background: #43b581; color: white; padding: 10px 20px;
            text-decoration: none; border-radius: 8px; font-weight: bold;
            display: block; margin-top: 15px; transition: 0.3s;
        }
        .manage-btn:hover { background: #1abc9c; }
    </style>
</head>
<body>
    <h1>اختر السيرفر المراد إدارته</h1>
    <div class="guilds-grid">
        {% for guild in guilds %}
        <div class="guild-card">
            {% if guild.icon %}
                <img src="https://cdn.discordapp.com/icons/{{guild.id}}/{{guild.icon}}.png" class="guild-icon">
            {% else %}
                <div class="guild-icon" style="background: #123d38; display: flex; align-items: center; justify-content: center; margin-left: auto; margin-right: auto;">OP</div>
            {% endif %}
            <h3>{{ guild.name }}</h3>
            <a href="/manage/{{ guild.id }}" class="manage-btn">إدارة الإعدادات</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
