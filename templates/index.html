<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>OP Dashboard</title>
    <style>
        body { background: #23272a; color: white; font-family: 'Cairo', sans-serif; text-align: center; }
        .nav { background: #2c2f33; padding: 20px; border-bottom: 2px solid #5865F2; display: flex; justify-content: space-between; align-items: center; }
        .card { background: #2c2f33; padding: 20px; border-radius: 10px; margin: 10px; border-top: 5px solid #5865F2; display: inline-block; min-width: 200px; }
        .btn { background: #5865F2; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
        .avatar { border-radius: 50%; width: 40px; vertical-align: middle; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="nav">
        <h1>OP BOT DASHBOARD</h1>
        {% if user %}
            <div><img class="avatar" src="https://cdn.discordapp.com/avatars/{{user.id}}/{{user.avatar}}.png"><span>{{ user.username }}</span></div>
        {% else %}
            <a href="/login" class="btn">Login with Discord</a>
        {% endif %}
    </div>
    <div style="margin-top: 50px;">
        <div class="card"><h3>Servers</h3><h2>{{ servers }}</h2></div>
        <div class="card"><h3>Users</h3><h2>{{ users }}</h2></div>
        <div class="card"><h3>Economy</h3><h2>{{ economy }}</h2></div>
    </div>
</body>
</html>
