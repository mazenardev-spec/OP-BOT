<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OP BOT | الرئيسية</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0a2e2a 0%, #051614 100%);
            color: #e0f2f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            overflow: hidden;
        }
        .hero {
            background: rgba(255, 255, 255, 0.03);
            padding: 60px; border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(67, 181, 129, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 500px;
        }
        h1 { 
            font-size: 4rem; margin: 0; 
            background: linear-gradient(to bottom, #43b581, #1abc9c); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        p { font-size: 1.3rem; color: #80cbc4; margin-bottom: 30px; }
        .btn {
            display: inline-block; padding: 18px 50px;
            background: linear-gradient(135deg, #43b581 0%, #1abc9c 100%);
            color: white; text-decoration: none;
            border-radius: 50px; font-weight: bold; font-size: 1.1rem;
            transition: 0.4s all ease;
            box-shadow: 0 4px 20px rgba(67, 181, 129, 0.4);
        }
        .btn:hover { 
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(67, 181, 129, 0.6);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>OP BOT</h1>
        <p>تحكم كامل بسيرفرك بلمسة زر</p>
        {% if user %}
            <a href="/dashboard" class="btn">دخول لوحة التحكم</a>
        {% else %}
            <a href="/login" class="btn">تسجيل دخول ديسكورد</a>
        {% endif %}
    </div>
</body>
</html>
