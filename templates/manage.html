<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إدارة الإعدادات | OP BOT</title>
    <style>
        body { background: #051614; color: #e0f2f1; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { 
            background: #0a2e2a; border-radius: 20px; padding: 30px; margin-bottom: 25px;
            border-right: 8px solid #43b581; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        h2 { color: #43b581; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        label { display: block; margin: 15px 0 5px; color: #80cbc4; font-weight: bold; }
        input, textarea, select { 
            width: 100%; padding: 14px; background: #123d38; border: 1px solid #1abc9c;
            color: white; border-radius: 10px; box-sizing: border-box; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #43b581; box-shadow: 0 0 10px rgba(67, 181, 129, 0.3); }
        .save-btn { 
            background: linear-gradient(135deg, #43b581 0%, #1abc9c 100%);
            color: white; border: none; padding: 20px; width: 100%;
            border-radius: 15px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; transition: 0.4s; margin-top: 20px;
        }
        .save-btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #80cbc4; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ إعدادات السيرفر: <span style="color: #43b581;">{{ guild.id }}</span></h1>
        
        <form action="/update/{{ guild.id }}" method="POST">
            <div class="card">
                <h2>👋 نظام الترحيب</h2>
                <label>رسالة الترحيب:</label>
                <textarea name="welcome_msg" rows="3" placeholder="أهلاً بك {user}...">{{ guild.welcome_msg }}</textarea>
                <label>آيدي روم الترحيب:</label>
                <input type="text" name="welcome_channel" value="{{ guild.welcome_ch }}">
            </div>

            <div class="card">
                <h2>🛡️ الأمان والرتب</h2>
                <label>آيدي الرتبة التلقائية (Auto Role):</label>
                <input type="text" name="autorole" value="{{ guild.autorole }}">
                <label>آيدي روم السجلات (Logs):</label>
                <input type="text" name="logs" value="{{ guild.logs }}">
                <div style="margin-top: 20px; display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="security" style="width: 25px; height: 25px;" {% if guild.security %}checked{% endif %}>
                    <span>تفعيل حماية الروابط والسبام</span>
                </div>
            </div>

            <div class="card">
                <h2>➕ إضافة رد تلقائي جديد</h2>
                <input type="text" name="new_word" placeholder="الكلمة (مثال: السلام)">
                <input type="text" name="new_reply" placeholder="الرد (مثال: وعليكم السلام)">
            </div>

            <button type="submit" class="save-btn">💾 حفظ التغييرات الآن</button>
        </form>
        
        <a href="/dashboard" class="back-link">⬅️ العودة لقائمة السيرفرات</a>
    </div>
</body>
</html>
